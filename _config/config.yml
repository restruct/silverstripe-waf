---
Name: silverstripe-waf
After:
  - corecache
---

# =============================================================================
# SILVERSTRIPE WAF - PHP-LEVEL WEB APPLICATION FIREWALL
# =============================================================================
# Blocks malicious requests before they reach your application.
# See README.md for full documentation.

# -----------------------------------------------------------------------------
# Core Setup
# -----------------------------------------------------------------------------

SilverStripe\Core\Injector\Injector:
  # Register WAF middleware (runs on every request)
  SilverStripe\Control\Director:
    properties:
      Middlewares:
        WafMiddleware: '%$Restruct\SilverStripe\Waf\Middleware\WafMiddleware'

  # Cache backend for rate limiting, ban checks, and blocklist lookups
  # Uses your configured cache (Memcached/Redis/file) - no special setup needed
  Psr\SimpleCache\CacheInterface.Waf:
    factory: SilverStripe\Core\Cache\CacheFactory
    constructor:
      namespace: 'Waf'

  # Blocklist service (singleton)
  Restruct\SilverStripe\Waf\Services\IpBlocklistService:
    class: Restruct\SilverStripe\Waf\Services\IpBlocklistService

# -----------------------------------------------------------------------------
# Middleware Configuration
# -----------------------------------------------------------------------------

Restruct\SilverStripe\Waf\Middleware\WafMiddleware:
  # Master switch - set to false to disable all WAF checks
  enabled: true

  # ---------------------------------------------------------------------------
  # Rate Limiting (Hard Limit)
  # ---------------------------------------------------------------------------
  # Blocks requests completely when limit is exceeded.
  # Returns HTTP 429 Too Many Requests.
  rate_limit_enabled: true
  rate_limit_requests: 150      # Max requests per IP per window
  rate_limit_window: 60         # Window duration in seconds

  # ---------------------------------------------------------------------------
  # Soft Rate Limiting (Progressive Delays)
  # ---------------------------------------------------------------------------
  # Slows down requests as they approach the hard limit.
  # Discourages bots while allowing legitimate burst traffic.
  #
  # Example with defaults (threshold 50%, max_delay 3000ms, limit 150):
  #   75 requests  →  0ms delay (at threshold)
  #   100 requests →  1000ms delay
  #   130 requests →  2200ms delay
  #   150+ requests → blocked (hard limit)
  soft_rate_limit_enabled: true
  soft_rate_limit_threshold: 50   # % of hard limit where delays start
  soft_rate_limit_max_delay: 3000 # Max delay in milliseconds (3 seconds)

  # ---------------------------------------------------------------------------
  # Privileged IPs (Elevated Rate Limits)
  # ---------------------------------------------------------------------------
  # IPs that still go through all security checks (bans, blocklist, user-agent)
  # but receive an elevated rate limit via a configurable multiplier.
  # Factor multiplies the base rate limit: Factor 2.0 with 150 req/min = 300 req/min.
  #
  # DB entries (managed via CMS admin) are merged with these config tiers.
  # DB entries override config for the same IP.
  #
  # Tier-based format:
  # privileged_tiers:
  #   office:
  #     factor: 3.0
  #     ips:
  #       - '10.0.0.0/8'
  #       - '192.168.1.0/24'
  #   monitoring:
  #     factor: 5.0
  #     ips:
  #       - '203.0.113.50'
  privileged_tiers:
    # SEO agencies / crawlers that need elevated limits
    # 150 base × 2.5 = 375 effective req/min
    seo_crawler:
      factor: 2.5
      ips: []

  # How long to cache the merged privileged IP list (seconds)
  privileged_ip_cache_duration: 300

  # ---------------------------------------------------------------------------
  # Auto-Ban
  # ---------------------------------------------------------------------------
  # Automatically bans IPs after repeated violations.
  # Violations include: blocklist hits, bad user-agents, rate limit exceeded.
  auto_ban_enabled: true
  ban_threshold: 10             # Number of violations before auto-ban
  ban_duration: 3600            # Ban duration in seconds (1 hour)

  # ---------------------------------------------------------------------------
  # Early Filter Banning (self-contained fail2ban alternative)
  # ---------------------------------------------------------------------------
  # When enabled, the early filter (pre-framework) tracks violations per IP
  # using lightweight files and bans repeat offenders for all URLs.
  # Uses ban_threshold and ban_duration from above.
  # Can also be toggled via WAF_EARLY_BAN env var (true/false).
  early_ban_enabled: true

  # ---------------------------------------------------------------------------
  # Logging
  # ---------------------------------------------------------------------------
  # Logs blocked requests to error_log in fail2ban-compatible format:
  # [WAF] BLOCKED reason=blocked_pattern ip=1.2.3.4 uri="/wp-admin/"
  log_blocked_requests: true

  # ---------------------------------------------------------------------------
  # Error Pages
  # ---------------------------------------------------------------------------
  # Use styled ErrorPage for rate limit (429) responses.
  # Creates friendlier experience for legitimate users who hit rate limits.
  # Requires silverstripe/errorpage module and a published 429 error page.
  # Falls back to plain text if ErrorPage not available.
  use_styled_error_pages: true

  # ---------------------------------------------------------------------------
  # IP Whitelist
  # ---------------------------------------------------------------------------
  # These IPs skip all WAF checks. Supports single IPs and CIDR notation.
  # Can also be set via WAF_WHITELIST_IPS environment variable (comma-separated).
  whitelisted_ips:
    - '127.0.0.1'
    - '::1'
    # - '10.0.0.0/8'            # Internal network example

  # ---------------------------------------------------------------------------
  # User-Agent Whitelist (Regex Patterns)
  # ---------------------------------------------------------------------------
  # These user-agents skip the blocked_user_agents check.
  # Useful for monitoring services and legitimate bots.
  whitelisted_user_agents:
    - '/ohdear\.app/i'          # OhDear monitoring
    - '/googlebot/i'            # Google crawler
    - '/bingbot/i'              # Bing crawler
    - '/uptimerobot/i'          # UptimeRobot monitoring
    - '/pingdom/i'              # Pingdom monitoring

  # ---------------------------------------------------------------------------
  # User-Agent Blocklist (Regex Patterns)
  # ---------------------------------------------------------------------------
  # Requests matching these patterns are blocked immediately.
  blocked_user_agents:
    - '/^$/i'                   # Empty user-agent (common in bots)
    - '/sqlmap/i'               # SQL injection tool
    - '/nikto/i'                # Vulnerability scanner
    - '/nmap/i'                 # Network scanner
    - '/masscan/i'              # Mass port scanner
    - '/zgrab/i'                # Go-based scanner
    - '/gobuster/i'             # Directory brute-forcer
    - '/dirbuster/i'            # Directory brute-forcer
    - '/wpscan/i'               # WordPress scanner

# -----------------------------------------------------------------------------
# Storage Configuration
# -----------------------------------------------------------------------------
# Determines where bans and blocked request logs are persisted.

Restruct\SilverStripe\Waf\Services\WafStorageService:
  # Storage mode - choose based on your needs:
  #
  # 'cache'    - Pure cache only (Memcached/Redis)
  #              Fastest, but data lost on cache clear
  #              Best for: Under attack, max performance needed
  #
  # 'file'     - Cache + JSON files in TEMP_PATH (same as framework cache)
  #              No database queries, survives cache clear
  #              Best for: Normal operation, most sites (DEFAULT)
  #
  # 'database' - Cache + database tables
  #              Full persistence, enables DataObject queries
  #              Best for: Audit requirements, large teams
  #
  # Can override via WAF_STORAGE_MODE environment variable.
  storage_mode: 'file'

  # Filenames for 'file' mode (stored in TEMP_PATH, or absolute path if starts with /)
  blocked_log_file: 'waf_blocked.jsonl'
  bans_file: 'waf_bans.json'

  # Max entries in blocked log before auto-rotation
  max_log_entries: 1000

  # High-load protection threshold
  # When violations per minute exceed this, skip all persistence
  # (runs in pure cache mode to maintain performance under attack)
  # Set to 0 to disable high-load detection
  high_load_threshold: 100

# -----------------------------------------------------------------------------
# IP Blocklist Service
# -----------------------------------------------------------------------------
# Downloads and caches threat intelligence feeds.

Restruct\SilverStripe\Waf\Services\IpBlocklistService:
  # Enable/disable blocklist checking
  sync_enabled: true

  # How long to cache the blocklist (seconds)
  # Feeds are only re-downloaded after this expires
  cache_duration: 3600          # 1 hour

  # How long to cache per-IP lookup results (seconds)
  # Reduces repeated lookups for the same visitor
  ip_result_cache_duration: 60  # 1 minute

  # ---------------------------------------------------------------------------
  # Blocklist Sources
  # ---------------------------------------------------------------------------
  # Add or modify threat intelligence feeds here.
  # Supported formats: 'ip', 'cidr', 'cidr_semicolon'
  blocklist_sources:
    # FireHOL Level 1 - aggregated list of most aggressive attackers
    # ~4,500 CIDR entries, updated frequently
    firehol_level1:
      url: 'https://raw.githubusercontent.com/firehol/blocklist-ipsets/master/firehol_level1.netset'
      enabled: true
      format: 'cidr'            # One CIDR per line

    # Binary Defense ban list - IPs attacking their honeypots
    # Small list, updated in real-time
    binarydefense:
      url: 'https://www.binarydefense.com/banlist.txt'
      enabled: true
      format: 'ip'              # One IP per line

    # Spamhaus DROP (Don't Route Or Peer) - hijacked IP ranges
    # Note: Review Spamhaus terms of use for commercial applications
    spamhaus_drop:
      url: 'https://www.spamhaus.org/drop/drop.txt'
      enabled: false            # Disabled by default
      format: 'cidr_semicolon'  # "CIDR ; comment" format

  # Local blocklist file (optional)
  # One IP or CIDR per line, lines starting with # are comments
  local_blocklist_file: null    # e.g., '/path/to/custom-blocklist.txt'

# -----------------------------------------------------------------------------
# Early Filter Configuration
# -----------------------------------------------------------------------------
# URL patterns blocked before Silverstripe loads (minimal overhead).

Restruct\SilverStripe\Waf\EarlyFilter:
  # URL patterns to block (substring match, case-insensitive)
  blocked_patterns:
    # WordPress probes (very common on any PHP site)
    - '/wp-admin'
    - '/wp-login'
    - '/wp-content'
    - '/wp-includes'
    - '/xmlrpc.php'
    - '/wp-config'

    # PHP backdoors and webshells
    - '/eval-stdin.php'
    - '/alfacgiapi'
    - '/alfa-rex'
    - '/shell.php'
    - '/c99.php'
    - '/r57.php'
    - '/wso.php'

    # Config and sensitive files
    - '/.env'
    - '/.git'
    - '/.svn'
    - '/.htpasswd'
    - '/.htaccess'
    - '/config.php'
    - '/configuration.php'
    - '/LocalSettings.php'
    - '/web.config'

    # Env config variants (not caught by /.env — .env as file extension)
    - 'config.env'
    - 'stripe.env'
    - '/env.js'
    - '/env.backup'
    - '/__env.js'

    # Build tool / framework dev probes
    - '/@vite/'
    - '/.vite/'
    - '/node_modules/'
    - '/asset-manifest.json'

    # Other CMS admin paths
    - '/administrator/index.php'
    - '/phpmyadmin'
    - '/pma/'
    - '/myadmin/'
    - '/adminer'

    # Path traversal attempts
    - '../'
    - '..%2f'
    - '..%252f'

  # Block random PHP file probes (e.g., /abc123.php, /xyz.php)
  # These are typically looking for uploaded webshells
  block_random_php_probes: true
  php_probe_pattern: '/^\/[a-z0-9_]{2,8}\.php$/i'

  # Short PHP files that are legitimate (won't be blocked)
  legitimate_php_files:
    - '/index.php'

# -----------------------------------------------------------------------------
# ModelAdmin Guard (Optional Extension)
# -----------------------------------------------------------------------------
# Prevents ModelAdmin from throwing errors on invalid ModelClass requests.
# Scanners probe admin URLs with garbage paths, causing PHP errors.
# This intercepts them before init() and returns 404 instead.
#
# Enable by uncommenting the extension below:
# SilverStripe\Admin\ModelAdmin:
#   extensions:
#     - Restruct\SilverStripe\Waf\Extensions\WafModelAdminExtension

# Return a JS fork bomb in the response (wastes scanner resources)
Restruct\SilverStripe\Waf\Extensions\WafModelAdminExtension:
  forkbomb: true

# -----------------------------------------------------------------------------
# QueuedJobs Integration (Optional)
# -----------------------------------------------------------------------------
# Auto-schedules blocklist sync if symbiote/silverstripe-queuedjobs is installed.
# The job runs every 6 hours and self-reschedules.

---
Name: silverstripe-waf-queuedjobs
After:
  - '#silverstripe-waf'
Only:
  moduleexists: 'symbiote/silverstripe-queuedjobs'
---

# Configure the sync job to run every 6 hours
Restruct\SilverStripe\Waf\Jobs\SyncBlocklistsJob:
  reschedule_interval: 21600    # 6 hours in seconds

# Auto-create the job on first run
SilverStripe\Core\Injector\Injector:
  Symbiote\QueuedJobs\Services\QueuedJobService:
    properties:
      defaultJobs:
        WafSyncBlocklistsJob:
          type: 'Restruct\SilverStripe\Waf\Jobs\SyncBlocklistsJob'
          filter:
            Implementation: 'Restruct\SilverStripe\Waf\Jobs\SyncBlocklistsJob'
          recreate: 1
          startDateFormat: 'Y-m-d H:i:s'
          startTimeString: '+5 minutes'
          construct:
